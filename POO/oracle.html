<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Clone</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #2a1812, #3a2016);
    color: white;
}

.header {
    background: #232a2f;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 30px;
    height: 55px;
}

/* LOGO CONTENEDOR */
.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* MEDIA DONA MÁS EXACTA */
.oracle-icon {
    width: 34px;
    height: 18px;
    border: 4px solid #f04e3e;
    border-bottom: none;
    border-radius: 40px 40px 0 0;
}

/* TEXTO LOGO */
.logo span {
    font-size: 16px;
    color: #e6e6e6;
    font-weight: 500;
}

/* MENUS */
.nav-left, .nav-right {
    display: flex;
    align-items: center;
    gap: 18px;
}

/* ITEMS MÁS PEQUEÑOS */
.menu-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #cfcfcf;
    cursor: pointer;
}

/* ICONOS MÁS FINOS */
.menu-item i {
    font-size: 13px;
}

/* HOVER SUAVE */
.menu-item:hover {
    color: white;
}

/* EMAIL */
.nav-right .menu-item {
    font-size: 13px;
    gap: 8px;
}

/* AJUSTE GENERAL DE CONTENIDO */
.container {
    padding: 40px 20px;
}

.card {
    max-width: 780px;
    padding: 25px;
}

.text h2 {
    font-size: 18px;
}

.score {
    font-size: 32px;
}

/* BOTON MÁS REAL */
.btn {
    font-size: 13px;
    padding: 10px 18px;
}
/* CARD REAL */
.card {
    background: #0f1a1f;
    border-radius: 10px;
    padding: 30px;
    max-width: 780px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* IZQUIERDA */
.left {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* ICONO INFO */
.info-icon {
    width: 45px;
    height: 45px;
    background: #3db2ff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* TEXTO */
.text p {
    color: #bfbfbf;
    font-size: 13px;
    margin: 4px 0;
}

/* BOTON MEJORADO */
.btn {
    background: #2e7d4f;
    padding: 10px 18px;
    border-radius: 6px;
    color: white;
    text-decoration: none;
    font-size: 13px;
    white-space: nowrap;
}

.btn:hover {
    background: #25663f;
}

/* FOOTER */
.footer {
    background: #1f2a30;
    text-align: center;
    padding: 20px;
    margin-top: 80px;
    font-size: 12px;
    color: #aaa;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .card {
        flex-direction: column;
        text-align: center;
    }

    .left {
        flex-direction: column;
    }
}


</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="nav-left">
        <div class="logo">
            <div class="oracle-icon"></div>
            <span>Oracle Academy</span>
        </div>

        <div class="menu-item"><i class="fa-solid fa-house"></i> Home</div>
        <div class="menu-item"><i class="fa-solid fa-circle-question"></i> Help</div>
        <div class="menu-item">
            <i class="fa-solid fa-globe"></i> Language 
            <i class="fa-solid fa-chevron-down"></i>
        </div>
    </div>

    <div class="nav-right">
        <div class="menu-item">
            <i class="fa-solid fa-user"></i>
            ccm2032462@est.univalle.edu
            <i class="fa-solid fa-chevron-down"></i>
        </div>
    </div>

</div>

<!-- CONTENIDO -->
<div class="container">
    <div class="card">

        <div class="left">
            <div class="info-icon">i</div>

            <div class="text">
                <h2>Examen final acumulativo de (S1-S11): DD Database Design</h2>
                <p>Note your score.</p>

                <p><strong>PERCENTAGE SCORED:</strong></p>
                <div class="score">88%</div>
                <p>Mastery Score: 60%</p>
            </div>
        </div>

        <a href="#" class="btn">View Results</a>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Oracle and/or its affiliates. |
    Terms of Use | Privacy | Accessibility | About Oracle
</div>

</body>
</html>
