<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gato Interactivo</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: sans-serif;
  overflow: hidden;
}

/* TEXTO */
.msg {
  color: white;
  margin-bottom: 20px;
  font-size: 1.2rem;
  opacity: 0.8;
  animation: fade 2s infinite alternate;
}

@keyframes fade {
  from { opacity: 0.4; }
  to { opacity: 1; }
}

/* GATO */
.cat {
  width: 60vw;
  max-width: 300px;
  image-rendering: pixelated;
  cursor: pointer;
  animation: float 3s ease-in-out infinite;
  transition: transform 0.2s;
}

/* flotando */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* salto */
.jump {
  animation: jump 0.4s ease;
}

@keyframes jump {
  0% { transform: translateY(0); }
  50% { transform: translateY(-30px) scale(1.05); }
  100% { transform: translateY(0); }
}

/* partículas */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="msg">Haz clic para sorprenderte ✨</div>

<img src="gato.png" class="cat" id="cat">

<audio id="sound" src="miau.mp3"></audio>

<script>
const cat = document.getElementById("cat");
const sound = document.getElementById("sound");

// click → sonido + animación
cat.addEventListener("click", () => {
  sound.currentTime = 0;
  sound.play();

  cat.classList.add("jump");
  setTimeout(() => cat.classList.remove("jump"), 400);
});

// partículas
for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
